group: composite
type: composite

cases:
  - id: ha_only
    messages:
      - wyłącz klimatyzację
    expected_tasks:
      - domain: home_assistant
        command:
          selection:
            include:
              - domain: climate
                scope: single
                area: office
          operation:
            intent: turn_off
    expected_calls:
      - tool: modify_device
        arguments:
          device: Study air conditioner
          property_name: hvac_mode
          value: "off"
    expected_effects:
      - device: Study air conditioner
        property_name: hvac_mode
        value: "off"
    expected_replies:
      - contains_all: [klimatyz]

  - id: time_only
    messages:
      - Która godzina?
    expected_tasks:
      - domain: time
        command:
          query:
            $any: ["Która godzina?", "Która godzina", "która godzina?"]
    expected_replies:
      - contains_all: [dziesiąta, czterdzieści, sześć]

  - id: wikipedia_only
    messages:
      - W którym roku urodził się Albert Einstein według Wikipedii?
    expected_tasks:
      - domain: wikipedia
        command:
          topic:
            $any: [Albert Einstein, Einstein]
    expected_replies:
      - contains_all: [Einstein, "1879"]

  - id: media_spotify_prefers_ma_duplicate
    messages:
      - Spotify!
    expected_tasks:
      - domain: media_player
        command:
          intent: start_last
          query: Spotify!
    expected_calls:
      - tool: list_media_players
        arguments:
          area_name: office
          music_assistant_only: false
          speakers_only: true
      - tool: list_media_players
        arguments:
          area_name: ""
          music_assistant_only: false
          speakers_only: true
      - tool: music_assistant_get_queue
        arguments:
          entity_id: media_player.office_2
      - tool: music_assistant_play_media
        arguments:
          entity_ids: [media_player.office_2]
          media_id: spotify:playlist:current-focus
          media_type: playlist
      - tool: media_player_shuffle_set
        arguments:
          entity_ids: [media_player.office_2]
          shuffle: true
    expected_replies:
      - contains_all: [Current Focus]

  - id: media_rock_genre_selection
    messages:
      - Graj muzykę rockową
    expected_tasks:
      - domain: media_player
        command:
          intent: play_media
          query:
            $any: [Graj muzykę rockową, muzykę rockową, rockową, rock]
    expected_calls:
      - tool: list_media_players
        arguments:
          area_name: office
          music_assistant_only: false
          speakers_only: true
      - tool: music_assistant_search
        arguments:
          name: muzykę rockową
          media_type: ""
          limit: 5
      - tool: music_assistant_play_media
        arguments:
          entity_ids: [media_player.office_2]
          media_id: spotify:search:muzyke-rockowa
          media_type: playlist
    expected_replies:
      - contains_all: [rock]

  - id: media_my_favourites_uses_user_playlist
    messages:
      - Graj moje ulubione
    expected_tasks:
      - domain: media_player
        command:
          intent: play_media
          query:
            $any: [Graj moje ulubione, Liked Songs]
    expected_calls:
      - tool: list_media_players
        arguments:
          area_name: office
          music_assistant_only: false
          speakers_only: true
      - tool: music_assistant_play_media
        arguments:
          entity_ids: [media_player.office_2]
          media_id: library://playlist/7
          media_type: playlist
    expected_replies:
      - contains_all: [Liked Songs macson_g]

  - id: ha_time_combo
    messages:
      - wyłącz klimę w biurze i powiedz która godzina jest teraz w Jacksonville
    expected_tasks:
      - domain: home_assistant
        command:
          operation:
            intent: turn_off
      - domain: time
        command:
          geo_location: Jacksonville
    expected_calls:
      - tool: modify_device
        arguments:
          device: Study air conditioner
          property_name: hvac_mode
          value: "off"
    expected_effects:
      - device: Study air conditioner
        property_name: hvac_mode
        value: "off"
    expected_replies:
      - contains_all: [klimatyz, Jacksonville]

  - id: ha_pracownia_alias
    messages:
      - wyłącz klimatyzację w pracowni
    expected_tasks:
      - domain: home_assistant
        command:
          selection:
            include:
              - domain: climate
                scope: single
                area: office
          operation:
            intent: turn_off
    expected_calls:
      - tool: modify_device
        arguments:
          device: Study air conditioner
          property_name: hvac_mode
          value: "off"
    expected_effects:
      - device: Study air conditioner
        property_name: hvac_mode
        value: "off"
    expected_replies:
      - contains_all: [klimatyz]

  - id: ha_wikipedia_combo
    messages:
      - włącz klimę w salonie i sprawdź w Wikipedii rok urodzenia Einsteina
    expected_tasks:
      - domain: home_assistant
        command:
          operation:
            intent: turn_on
      - domain: wikipedia
        command:
          topic:
            $any: [Albert Einstein, Einstein]
    expected_calls:
      - tool: modify_device
        arguments:
          device: Living room air conditioner
    expected_replies:
      - contains_all: [klimatyz, Einstein, "1879"]

  - id: followup_context
    messages:
      - Włącz klimatyzację w salonie
      - Super! I ustaw ją na 22 stopnie
    expected_tasks:
      - domain: home_assistant
        command:
          operation:
            intent: turn_on
      - domain: home_assistant
        command:
          selection:
            include:
              - domain: climate
                scope: single
                area:
                  $any: [salon, living_room]
          operation:
            intent: set_temperature
            parameters:
              temperature: 22
    expected_calls:
      - tool: modify_device
        arguments:
          device: Living room air conditioner
      - tool: modify_device
        arguments:
          device: Living room air conditioner
          property_name: target_temperature
          value: 22
    expected_effects:
      - device: Living room air conditioner
        property_name: hvac_mode
        value: cool
      - device: Living room air conditioner
        property_name: target_temperature
        value: 22
    expected_replies:
      - contains_all: [klimatyz, salon]
      - contains_all: ["22"]
    expected_planning_context:
      - message_index: 1
        salient_entities:
          - climate.living_room
