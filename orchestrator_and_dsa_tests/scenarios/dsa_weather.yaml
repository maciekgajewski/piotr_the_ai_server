group: dsa_weather
type: dsa_weather

cases:
  - id: current_temperature
    task:
      id: t1
      domain: weather
      command:
        tool: get_weather_now
        query: Jaka jest temperatura?
        focus: temperature
    expected_result:
      status: ok
      final_reply_mode: verbatim
    expected_replies:
      - contains_all: [Wrocławiu, szesnaście, stopni]

  - id: local_sunset
    task:
      id: t1
      domain: weather
      command:
        query: o której dzisiaj zachód słońca.
    expected_result:
      status: ok
      final_reply_mode: verbatim
      data:
        kind: astronomy
        astronomy:
          focus: sunset
          today:
            sunset: "21:10"
    expected_replies:
      - contains_all: [Wrocławiu, zachód, dwadzieścia jeden dziesięć]
