services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    gpus: all

  ai-server:
    build:
      context: .
      dockerfile: docker/ai-server.Dockerfile
    restart: unless-stopped
    depends_on:
      - ollama
    network_mode: host
    gpus: all
    volumes:
      - ${AI_SERVER_CONFIG:?Set AI_SERVER_CONFIG to the AI server YAML config file}:/config/ai_server.yaml:ro
      - ./.hf-cache:/app/.hf-cache
      - ./.piper-cache:/app/.piper-cache
      - ./audio:/app/audio
    entrypoint:
      - python3
      - -m
      - ai_server.server
      - --ollama-url
      - http://127.0.0.1:11434

volumes:
  ollama:
