services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    gpus: all

  wyoming-piper:
    build:
      context: .
      dockerfile: docker/ai-server.Dockerfile
    restart: unless-stopped
    network_mode: host
    gpus: all
    environment:
      PIPER_HOME: /app/.piper-cache
    volumes:
      - ./.piper-cache:/app/.piper-cache
    entrypoint:
      - wyoming-piper
      - --voice
      - "${AI_SERVER_TTS_VOICE:?AI_SERVER_TTS_VOICE must be set in the services config}"
      - --uri
      - tcp://0.0.0.0:10200
      - --data-dir
      - /app/.piper-cache
      - --download-dir
      - /app/.piper-cache
      - --update-voices
      - --use-cuda
      - --samples-per-chunk
      - "1024"

  wyoming-whisper:
    build:
      context: .
      dockerfile: docker/ai-server.Dockerfile
    restart: unless-stopped
    network_mode: host
    gpus: all
    environment:
      HF_HOME: /app/.hf-cache
    volumes:
      - ./.whisper-cache:/data
      - ./.hf-cache:/app/.hf-cache
    entrypoint:
      - python3
      - -m
      - wyoming_faster_whisper
      - --model
      - "${AI_SERVER_STT_MODEL:?AI_SERVER_STT_MODEL must be set in the services config}"
      - --language
      - "${AI_SERVER_STT_LANGUAGE:?AI_SERVER_STT_LANGUAGE must be set in the services config}"
      - --device
      - "${AI_SERVER_STT_DEVICE:?AI_SERVER_STT_DEVICE must be set in the services config}"
      - --compute-type
      - "${AI_SERVER_STT_COMPUTE_TYPE:?AI_SERVER_STT_COMPUTE_TYPE must be set in the services config}"
      - --beam-size
      - "${AI_SERVER_STT_BEAM_SIZE:?AI_SERVER_STT_BEAM_SIZE must be set in the services config}"
      - --uri
      - tcp://0.0.0.0:10300
      - --data-dir
      - /data
      - --download-dir
      - /data

  ai-server:
    build:
      context: .
      dockerfile: docker/ai-server.Dockerfile
    restart: unless-stopped
    depends_on:
      - ollama
      - wyoming-piper
      - wyoming-whisper
    network_mode: host
    gpus: all
    volumes:
      - ./ai_server:/app/ai_server:ro
      - "${AI_SERVER_CONFIG:?AI_SERVER_CONFIG must be set to the AI server config file path}:/config/ai_server.yaml:ro"
      - ./.hf-cache:/app/.hf-cache
      - ./.piper-cache:/app/.piper-cache
      - ./.whisper-cache:/app/.whisper-cache
      - ./audio:/app/audio
    entrypoint:
      - /usr/local/bin/ai-server-entrypoint.sh
    command:
      - python3
      - -m
      - ai_server.server
      - --config
      - /config/ai_server.yaml
      - --ollama-url
      - http://127.0.0.1:11434

volumes:
  ollama:
