services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    gpus: all

  wyoming-piper:
    build:
      context: .
      dockerfile: docker/ai-server.Dockerfile
    restart: unless-stopped
    network_mode: host
    gpus: all
    environment:
      PIPER_HOME: /app/.piper-cache
    volumes:
      - ./.piper-cache:/app/.piper-cache
    entrypoint:
      - wyoming-piper
      - --voice
      - "${AI_SERVER_TTS_VOICE:?AI_SERVER_TTS_VOICE must be set in the services config}"
      - --uri
      - tcp://0.0.0.0:10200
      - --data-dir
      - /app/.piper-cache
      - --download-dir
      - /app/.piper-cache
      - --update-voices
      - --use-cuda
      - --samples-per-chunk
      - "1024"

volumes:
  ollama:
