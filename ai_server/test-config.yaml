log_level: INFO
cache_dir: ~/.ai-server/cache/
data_dir: ~/.ai-server/data/

server:
  timezone: Europe/Warsaw
  location: Wrocław

agent:
  type: polite_reply
  model: gpt-oss:20b-cloud
  fallback_model: qwen3:4b-instruct

websocket:
  host: 0.0.0.0
  port: 2137
  path: /chat
  follow_up_timeout_seconds: 60

stt:
  model: base
  language: pl
  device: auto
  compute_type: default
  local_files_only: true
  beam_size: 5
  capture_seconds: 5

tts:
  voice: pl_PL-bass-high
  volume: 1.0

microphones:
  initial_silence_seconds: 3
  end_silence_seconds: 0.9
  speech_peak_threshold: 500
  post_speech_ignore_seconds: 1
  follow_up_timeout_seconds: 15
  devices:
    # - type: box3_esphome
    #   name: box3-office
    #   address: piotr-box3-01-cbfaA8.local
    #   api_key: replace-with-esphome-api-key
    #   area: office
