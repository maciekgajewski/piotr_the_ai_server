log_level: INFO
cache_dir: ~/.ai-server/cache/

server:
  timezone: Europe/Warsaw
  location: Wrocław

agent:
  type: polite_reply
  model: qwen3:4b

websocket:
  host: 0.0.0.0
  port: 2137
  path: /chat

stt:
  model: base
  language: pl
  device: auto
  beam_size: 5
  capture_seconds: 5

tts:
  voice: pl_PL-bass-high
  volume: 1.0

microphones:
  initial_silence_seconds: 3
  end_silence_seconds: 0.9
  follow_up_timeout_seconds: 15
  devices:
