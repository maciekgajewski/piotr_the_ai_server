log_level: INFO
cache_dir: ~/.ai-server/cache/

server:
  timezone: Europe/Warsaw
  location: Wrocław

default_user: Maciek
users:
  Maciek:
    voice_profile: /home/maciek/user_voice_data/maciek/profile/speaker_profile.npz
    media:
      liked_songs_media_id: library://playlist/7
      liked_songs_media_type: playlist
      liked_songs_name: Liked Songs macson_g
      default_music_media_id: library://playlist/7
      default_music_media_type: playlist
      default_music_name: moje ulubione

agent:
  type: polite_reply
  model: gpt-oss:20b-cloud
  fallback_model: qwen3:4b-instruct

# Orchestrator example:
# agent:
#   type: orchestrator
#   orchestrator_model: qwen3:4b-instruct
#   model: gpt-oss:20b-cloud
#   clarification_model: gpt-oss:20b-cloud
