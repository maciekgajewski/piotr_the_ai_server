#   domain_agents:
#     time: {}
#     wikipedia: {}
#     weather: {}
#     media_player:
#       default_music_media_id: Liked Songs
#       default_music_media_type: playlist
#       default_music_name: muzykę ze Spotify
#     home_assistant:
#       model: gpt-oss:20b-cloud
#       fallback_model: qwen3:4b-instruct

websocket:
  host: 0.0.0.0
  port: 2137
  path: /chat
  follow_up_timeout_seconds: 60

stt:
  model: base
  language: pl
  device: auto
  beam_size: 5
  capture_seconds: 5

tts:
  voice: pl_PL-bass-high
  volume: 1.0

speaker_recognition:
  url: http://127.0.0.1:2140
  timeout_seconds: 1.0

# Example microphone override:
# microphones:
#   initial_silence_seconds: 3
#   end_silence_seconds: 0.9
#   speech_peak_threshold: 500
#   post_speech_ignore_seconds: 1
#   follow_up_timeout_seconds: 15
#   devices:
#     - type: box3_esphome
#       name: box3-office
#       area: office
#       initial_silence_seconds: 4
#       end_silence_seconds: 1.1
#       speech_peak_threshold: 700
#       post_speech_ignore_seconds: 1.5
#       follow_up_timeout_seconds: 20
#       address: piotr-box3.local
#       api_key: secret
microphones:
  initial_silence_seconds: 3
  end_silence_seconds: 0.9
  speech_peak_threshold: 500
  post_speech_ignore_seconds: 1
  follow_up_timeout_seconds: 15
  devices: []
