log_level: INFO
cache_dir: ~/.ai-server/cache/

server:
  timezone: Europe/Warsaw
  location: Wrocław

agent:
  type: polite_reply
  model: qwen3:4b

# Orchestrator example:
# agent:
#   type: orchestrator
#   model: qwen3:4b-instruct
#   domain_agents:
#     time: {}
#     wikipedia: {}
#     home_assistant:
#       model: qwen3:4b-instruct

websocket:
  host: 0.0.0.0
  port: 2137
  path: /chat

stt:
  model: base
  language: pl
  device: auto
  beam_size: 5
  capture_seconds: 5

tts:
  voice: pl_PL-bass-high
  volume: 1.0

# Example microphone override:
# microphones:
#   initial_silence_seconds: 3
#   end_silence_seconds: 0.9
#   follow_up_timeout_seconds: 15
#   devices:
#     - type: box3_esphome
#       name: box3-office
#       area: office
#       initial_silence_seconds: 4
#       end_silence_seconds: 1.1
#       follow_up_timeout_seconds: 20
#       address: piotr-box3.local
#       api_key: secret
microphones:
  initial_silence_seconds: 3
  end_silence_seconds: 0.9
  follow_up_timeout_seconds: 15
  devices: []
