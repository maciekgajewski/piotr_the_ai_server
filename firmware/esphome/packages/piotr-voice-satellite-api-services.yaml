api:
  services:
    - service: play_message_end_cue
      then:
        - script.execute: play_message_end_cue
        - script.wait: play_message_end_cue
    - service: play_conversation_timeout_cue
      then:
        - script.execute: play_conversation_timeout_cue
        - script.wait: play_conversation_timeout_cue
    - service: start_follow_up_listening
      then:
        - script.execute: start_follow_up_listening
        - script.wait: start_follow_up_listening
    - service: start_open_mic_listening
      then:
        - script.execute: start_open_mic_listening
        - script.wait: start_open_mic_listening
    - service: stop_listening
      then:
        - script.execute: stop_listening
        - script.wait: stop_listening
    - service: reset_open_mic_wake_candidate
      then:
        - script.execute: reset_open_mic_wake_candidate
        - script.wait: reset_open_mic_wake_candidate
    - service: set_visual_idle
      then:
        - script.execute: set_visual_idle
    - service: set_visual_listening
      then:
        - script.execute: set_visual_listening
    - service: set_visual_processing
      then:
        - script.execute: set_visual_processing
