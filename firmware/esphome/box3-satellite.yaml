substitutions:
  name: piotr-box3-01
  friendly_name: Piotr Box 3 01

packages:
  esphome.voice-assistant: github://esphome/wake-word-voice-assistants/esp32-s3-box-3/esp32-s3-box-3.yaml@main

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret box3_01_api_key

ota:
  - platform: esphome
    password: !secret box3_01_ota_password

# Custom wake word note:
# The upstream package currently defines the micro_wake_word model list as
# okay_nabu, hey_mycroft, and hey_jarvis. For a truly custom phrase, train a
# microWakeWord model and then replace that list with the model JSON URL/path.
# See docs/esp32-s3-box-3-satellite.md before editing this file.
