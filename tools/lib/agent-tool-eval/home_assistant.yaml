domain: home_assistant

defaults:
  model: qwen3:8b
  ollama_url: http://127.0.0.1:11434
  area: Office
  user: Maciek
  think: false
  request_timeout_seconds: 60
  max_tool_calls_per_message: 8
  max_tool_repair_attempts: 2

home_assistant:
  inventory:
    areas:
      - area_id: office
        name: Office
        aliases: [biuro, gabinet, pracownia]
      - area_id: living_room
        name: Living room
        aliases: [salon, pokój dzienny]
      - area_id: bedroom
        name: Bedroom
        aliases: [sypialnia]
    devices:
      - device_id: office_ac
        area_id: office
        name: Study air conditioner
        type: climate
        aliases: [office air conditioner, klima w biurze, klimatyzacja w biurze]
        entities:
          - entity_id: climate.study_air_conditioner
            name: Study air conditioner
            aliases: [office air conditioner, klima w biurze, klimatyzacja w biurze]
            state: cool
            attributes:
              temperature: 24
              hvac_modes: ["off", cool, heat, fan_only]
        properties:
          - property_name: hvac_mode
            entity_id: climate.study_air_conditioner
            domain: climate
            value_type: string
            description: HVAC mode
            allowed_values: ["off", cool, heat, fan_only]
          - property_name: target_temperature
            entity_id: climate.study_air_conditioner
            domain: climate
            value_type: number
            description: Target temperature in Celsius
            min_value: 16
            max_value: 30
            step: 0.5
      - device_id: living_room_ac
        area_id: living_room
        name: Living room air conditioner
        type: climate
        aliases: [salon air conditioner, klima w salonie, klimatyzacja w salonie]
        entities:
          - entity_id: climate.living_room_air_conditioner
            name: Living room air conditioner
            aliases: [salon air conditioner, klima w salonie, klimatyzacja w salonie]
            state: cool
            attributes:
              temperature: 24
              hvac_modes: ["off", cool, heat, fan_only]
        properties:
          - property_name: hvac_mode
            entity_id: climate.living_room_air_conditioner
            domain: climate
            value_type: string
            description: HVAC mode
            allowed_values: ["off", cool, heat, fan_only]
          - property_name: target_temperature
            entity_id: climate.living_room_air_conditioner
            domain: climate
            value_type: number
            description: Target temperature in Celsius
            min_value: 16
            max_value: 30
            step: 0.5
      - device_id: bedroom_ac
        area_id: bedroom
        name: Bedroom air conditioner
        type: climate
        aliases: [bedroom air conditioner, klima w sypialni, klimatyzacja w sypialni]
        entities:
          - entity_id: climate.bedroom_air_conditioner
            name: Bedroom air conditioner
            aliases: [bedroom air conditioner, klima w sypialni, klimatyzacja w sypialni]
            state: cool
            attributes:
              temperature: 24
              hvac_modes: ["off", cool, heat, fan_only]
        properties:
          - property_name: hvac_mode
            entity_id: climate.bedroom_air_conditioner
            domain: climate
            value_type: string
            description: HVAC mode
            allowed_values: ["off", cool, heat, fan_only]
          - property_name: target_temperature
            entity_id: climate.bedroom_air_conditioner
            domain: climate
            value_type: number
            description: Target temperature in Celsius
            min_value: 16
            max_value: 30
            step: 0.5

scenarios:
  - name: office-turn-off-climate-from-current-area
    area: Office
    message: wyłącz klimatyzację
    expected_calls:
      - tool: list_devices
        optional: true
        arguments:
          area_name: Office
      - tool: list_modifiable_properties
        optional: true
        arguments:
          device: Study air conditioner
      - tool: modify_device
        optional: true
        arguments:
          device: Study air conditioner
          property_name: hvac_mode
          value: "off"
        result:
          status: ok
          service: climate.set_hvac_mode
          entity_id: climate.study_air_conditioner
    expected_effects:
      - device: Study air conditioner
        property_name: hvac_mode
        value: "off"
    confirmation:
      contains_all: [klimatyz, wyłącz]

  - name: turn-off-all-climate-devices
    area: Office
    message: wyłącz wszystkie klimatyzacje
    expected_calls:
      - tool: find_devices
        optional: true
        arguments:
          device_type: climate
      - tool: list_common_modifiable_properties
        optional: true
        arguments:
          devices:
            - Study air conditioner
            - Living room air conditioner
            - Bedroom air conditioner
      - tool: modify_devices
        optional: true
        arguments:
          devices:
            - Study air conditioner
            - Living room air conditioner
            - Bedroom air conditioner
          property_name: hvac_mode
          value: "off"
        result:
          status: ok
          results:
            - device: Study air conditioner
              result: {status: ok, service: climate.set_hvac_mode, entity_id: climate.study_air_conditioner}
            - device: Living room air conditioner
              result: {status: ok, service: climate.set_hvac_mode, entity_id: climate.living_room_air_conditioner}
            - device: Bedroom air conditioner
              result: {status: ok, service: climate.set_hvac_mode, entity_id: climate.bedroom_air_conditioner}
    expected_effects:
      - device: Study air conditioner
        property_name: hvac_mode
        value: "off"
      - device: Living room air conditioner
        property_name: hvac_mode
        value: "off"
      - device: Bedroom air conditioner
        property_name: hvac_mode
        value: "off"
    confirmation:
      contains_all: [wszystkie, klimatyz, wyłącz]

  - name: living-room-climate-fan-only-by-room-alias
    area: Office
    message: włącz klimatyzator w salonie w trybie wentylacji
    expected_calls:
      - tool: list_devices
        optional: true
        arguments:
          area_name: salon
      - tool: list_modifiable_properties
        optional: true
        arguments:
          device: Living room air conditioner
      - tool: modify_device
        optional: true
        arguments:
          device: Living room air conditioner
          property_name: hvac_mode
          value: fan_only
        result:
          status: ok
          service: climate.set_hvac_mode
          entity_id: climate.living_room_air_conditioner
    expected_effects:
      - device: Living room air conditioner
        property_name: hvac_mode
        value: fan_only
    confirmation:
      contains_all: [salon, wentylac]

  - name: current-area-set-climate-temperature
    area: Office
    message: ustaw klimę na 26 stopni
    expected_calls:
      - tool: list_devices
        optional: true
        arguments:
          area_name: Office
      - tool: list_modifiable_properties
        optional: true
        arguments:
          device: Study air conditioner
      - tool: modify_device
        optional: true
        arguments:
          device: Study air conditioner
          property_name: target_temperature
          value: 26
        result:
          status: ok
          service: climate.set_temperature
          entity_id: climate.study_air_conditioner
    expected_effects:
      - device: Study air conditioner
        property_name: target_temperature
        value: 26
    confirmation:
      contains_all: ["26"]

  - name: follow-up-uses-existing-climate-context
    area: Living room
    messages:
      - Włącz klimatyzację w salonie
      - Super! I ustaw ją na 22 stopnie
    expected_calls:
      - tool: list_devices
        optional: true
        arguments:
          area_name: salon
      - tool: list_modifiable_properties
        optional: true
        arguments:
          device: Living room air conditioner
      - tool: modify_device
        optional: true
        arguments:
          device: Living room air conditioner
          property_name: hvac_mode
          value: cool
        result:
          status: ok
          service: climate.set_hvac_mode
          entity_id: climate.living_room_air_conditioner
      - tool: modify_device
        optional: true
        arguments:
          device: Living room air conditioner
          property_name: target_temperature
          value: 22
        result:
          status: ok
          service: climate.set_temperature
          entity_id: climate.living_room_air_conditioner
    expected_effects:
      - device: Living room air conditioner
        property_name: hvac_mode
        value: cool
      - device: Living room air conditioner
        property_name: target_temperature
        value: 22
    confirmations:
      - contains_all: [salon, klimatyz]
      - contains_all: [salon, "22"]
