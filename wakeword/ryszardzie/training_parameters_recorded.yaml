window_step_ms: 10
train_dir: /app/wakeword/ryszardzie/trained_models/wakeword_recorded
features:
- features_dir: /app/wakeword/ryszardzie/generated_features_recorded
  sampling_weight: 2.0
  penalty_weight: 1.0
  truth: true
  truncation_strategy: truncate_start
  type: mmap
- features_dir: /app/wakeword/ryszardzie/negative_datasets/speech
  sampling_weight: 10.0
  penalty_weight: 1.0
  truth: false
  truncation_strategy: random
  type: mmap
- features_dir: /app/wakeword/ryszardzie/negative_datasets/dinner_party
  sampling_weight: 10.0
  penalty_weight: 1.0
  truth: false
  truncation_strategy: random
  type: mmap
- features_dir: /app/wakeword/ryszardzie/negative_datasets/no_speech
  sampling_weight: 5.0
  penalty_weight: 1.0
  truth: false
  truncation_strategy: random
  type: mmap
- features_dir: /app/wakeword/ryszardzie/negative_datasets/dinner_party_eval
  sampling_weight: 0.0
  penalty_weight: 1.0
  truth: false
  truncation_strategy: split
  type: mmap
training_steps:
- 1500
positive_class_weight:
- 1
negative_class_weight:
- 20
learning_rates:
- 0.001
batch_size: 128
time_mask_max_size:
- 0
time_mask_count:
- 0
freq_mask_max_size:
- 0
freq_mask_count:
- 0
eval_step_interval: 500
clip_duration_ms: 1500
target_minimization: 0.9
minimization_metric: null
maximization_metric: average_viable_recall
